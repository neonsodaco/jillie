<!doctype html>
<html lang="en-AU">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <!-- Locked-down content security policy: only our own bundled code and assets
         may run; no external scripts, styles, fonts, or network destinations. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="theme-color" content="#FAF7F2" />
    <!-- Jillie is a designed-light app: opt out of browser auto-darkening
         so dark-mode phones render it exactly as designed. -->
    <meta name="color-scheme" content="only light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="./icons/icon-192-v2.png" />
    <link rel="apple-touch-icon" href="./icons/icon-192-v2.png" />
    <link rel="preload" href="./fonts/nunito-latin.woff2" as="font" type="font/woff2" crossorigin />
    <title>Jillie</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
